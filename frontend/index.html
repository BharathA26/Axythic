<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Axythic | Custom Software &amp; Web App Development Agency — India</title>
    <meta name="description" content="Axythic builds custom software, web applications, and mobile apps tailored to accelerate your business growth. Based in Erode, Tamil Nadu, India." />
    <link rel="canonical" href="https://axythic.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://axythic.com/" />
    <meta property="og:title" content="Axythic | Custom Software &amp; Web App Development Agency" />
    <meta property="og:description" content="We build custom software, web applications, and mobile apps tailored to accelerate your business growth and dominate the digital landscape." />
    <meta property="og:image" content="https://axythic.com/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Axythic" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://axythic.com/" />
    <meta name="twitter:title" content="Axythic | Custom Software &amp; Web App Development Agency" />
    <meta name="twitter:description" content="We build custom software, web applications, and mobile apps tailored to accelerate your business growth." />
    <meta name="twitter:image" content="https://axythic.com/og-preview.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Axythic",
      "url": "https://axythic.com",
      "logo": "https://axythic.com/vite.png",
      "description": "Axythic builds custom software, web applications, and mobile apps tailored to accelerate your business growth.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Erode",
        "addressRegion": "Tamil Nadu",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@axythic.com",
        "contactType": "customer support"
      },
      "sameAs": []
    }
    </script>

    <!-- Anti-FOUC: Apply saved theme class before React mounts -->
    <script>
      (function () {
        var saved = localStorage.getItem("axythic-theme");
        var theme = saved === "light" ? "light" : "dark";
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Blue left face -->
    <linearGradient id="fBlue" x1="50" y1="8" x2="6" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#42B4F5"/>
      <stop offset="50%"  stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D3A8A"/>
    </linearGradient>

    <!-- Rainbow diagonal face: cyan → purple → magenta → orange -->
    <linearGradient id="fRainbow" x1="50" y1="8" x2="88" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D4E8"/>
      <stop offset="30%"  stop-color="#8B3FD9"/>
      <stop offset="65%"  stop-color="#E82070"/>
      <stop offset="100%" stop-color="#FF6010"/>
    </linearGradient>

    <!-- Silver-blue right edge -->
    <linearGradient id="fSilver" x1="66" y1="8" x2="94" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A8D4F0"/>
      <stop offset="100%" stop-color="#4D7490"/>
    </linearGradient>

    <!-- Apex glint -->
    <radialGradient id="fApex" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Left blue face (left leg of A) -->
  <polygon fill="url(#fBlue)"    points="50,8 6,92 26,92 50,63"/>

  <!-- Rainbow center-right face (right leg + diagonal strip) -->
  <polygon fill="url(#fRainbow)" points="50,8 64,8 88,92 72,92 50,63"/>

  <!-- Thin metallic right edge (3-D depth) -->
  <polygon fill="url(#fSilver)"  points="64,8 68,8 92,92 88,92"/>

  <!-- Soft apex highlight -->
  <ellipse cx="56" cy="18" rx="12" ry="7"
    fill="url(#fApex)"
    transform="rotate(-20, 56, 18)"/>
</svg>
